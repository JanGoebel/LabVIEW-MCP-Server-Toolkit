name: Build and Release MCP Toolkit

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build VI Package via VIPM CLI
        timeout-minutes: 25 
        env:
          VIPM_CLI_TIMEOUT: 1200
        run: |
          $vipbFile = "$env:GITHUB_WORKSPACE\src\LabVIEW MCP Server SDK.vipb"
          
          $gitTag = "${{ github.ref_name }}"
          Write-Host "Detected Git Tag: $gitTag"
          
          if ($gitTag -match "v?(\d+)\.(\d+)\.(\d+)(?:\.(\d+))?") {
            $major = $matches[1]
            $minor = $matches[2]
            $patch = $matches[3]
            $build = if ($matches[4]) { $matches[4] } else { 0 }
            
            $newVersion = "$major.$minor.$patch.$build"
            Write-Host "Updating VIPB to version: $newVersion"
            
            $vipbContent = Get-Content $vipbFile
            $vipbContent = $vipbContent -replace "<Library_Version>.*?</Library_Version>", "<Library_Version>$newVersion</Library_Version>"
            Set-Content -Path $vipbFile -Value $vipbContent
          } else {
            Write-Warning "Git tag '$gitTag' does not look like a version number (e.g. v1.2.3). Using default VIPB version."
          }

          Write-Host "Building VI Package..."
          vipm build "$vipbFile"
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "VIPM CLI build failed with exit code $LASTEXITCODE."
            exit 1
          }

      - name: Locate Built VIP Artifact
        id: find_vip
        run: |
          $vipFile = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\builds" | Where-Object { $_.Extension -eq ".vip" } | Select-Object -First 1
          echo "VIP_PATH=$($vipFile.FullName)" >> $env:GITHUB_ENV

      - name: Upload Artifact for Testing
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: test-vip-package
          path: ${{ env.VIP_PATH }}

      - name: Create GitHub Release and Upload VIP
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VIP_PATH }}
          generate_release_notes: true