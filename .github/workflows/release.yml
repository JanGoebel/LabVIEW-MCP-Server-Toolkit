name: Build and Release MCP Toolkit

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build VI Package via VIPM CLI
        timeout-minutes: 10 
        run: |
          # 1. Clean Slate
          Get-Process "LabVIEW", "VI Package Manager" -ErrorAction SilentlyContinue | Stop-Process -Force
          
          $vipbFile = "$env:GITHUB_WORKSPACE\src\LabVIEW MCP Server SDK.vipb"
          Write-Host "Building VI Package..."
          
          # 2. Call it exactly like you do in your local CMD
          vipm build "$vipbFile"
          
          # 3. Catch errors
          if ($LASTEXITCODE -ne 0) {
            Write-Error "VIPM exited with error code $LASTEXITCODE. You definitely have a hidden LabVIEW popup."
            exit 1
          }

      - name: Locate Built VIP Artifact
        id: find_vip
        run: |
          $vipFile = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\builds" | Where-Object { $_.Extension -eq ".vip" } | Select-Object -First 1
          echo "VIP_PATH=$($vipFile.FullName)" >> $env:GITHUB_ENV

      - name: Upload Artifact for Testing
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: test-vip-package
          path: ${{ env.VIP_PATH }}

      - name: Create GitHub Release and Upload VIP
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VIP_PATH }}
          generate_release_notes: true