name: Build and Release MCP Toolkit

on:
  push:
    # Trigger ONLY when a tag is pushed. Ignore standard branch pushes.
    tags:
      - 'v*.*.*'       # Matches official releases like v2.3.0
      - 'build*'       # Matches test builds like build-test-1

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build VI Package via VIPM CLI
        timeout-minutes: 25 
        env:
          VIPM_CLI_TIMEOUT: 1200
        run: |
          $vipbFile = "$env:GITHUB_WORKSPACE\src\LabVIEW MCP Server SDK.vipb"
          
          # 1. Grab the Git tag and the Commit Message
          $gitTag = "${{ github.ref_name }}"
          $commitMsg = "${{ github.event.head_commit.message }}"
          
          Write-Host "Detected Tag: $gitTag"
          Write-Host "Commit Message to use for Release Notes: $commitMsg"
          
          # 2. Update the Version Number (Only if it's a 'v' release tag)
          $vipbContent = Get-Content $vipbFile
          
          if ($gitTag -match "v?(\d+)\.(\d+)\.(\d+)(?:\.(\d+))?") {
            $major = $matches[1]
            $minor = $matches[2]
            $patch = $matches[3]
            $build = if ($matches[4]) { $matches[4] } else { 0 }
            
            $newVersion = "$major.$minor.$patch.$build"
            Write-Host "Updating VIPB to version: $newVersion"
            $vipbContent = $vipbContent -replace "<Library_Version>.*?</Library_Version>", "<Library_Version>$newVersion</Library_Version>"
          } else {
            Write-Host "Tag '$gitTag' is not a version number. Keeping default VIPB version."
          }

          # 3. Inject the Commit Message into Release Notes
          # We use regex to replace everything between the <Release_Notes> tags
          # We also escape XML special characters in the commit message just in case
          $safeMsg = [System.Security.SecurityElement]::Escape($commitMsg)
          $vipbContent = $vipbContent -replace "<Release_Notes>.*?</Release_Notes>", "<Release_Notes>$safeMsg</Release_Notes>"
          
          Set-Content -Path $vipbFile -Value $vipbContent

          # 4. Run the build
          Write-Host "Building VI Package..."
          vipm build "$vipbFile"
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "VIPM CLI build failed with exit code $LASTEXITCODE."
            exit 1
          }

      - name: Locate Built VIP Artifact
        id: find_vip
        run: |
          $vipFile = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\builds" | Where-Object { $_.Extension -eq ".vip" } | Select-Object -First 1
          echo "VIP_PATH=$($vipFile.FullName)" >> $env:GITHUB_ENV

      # Upload as a workflow artifact if it's just a 'build' tag
      - name: Upload Artifact for Testing
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: test-vip-package
          path: ${{ env.VIP_PATH }}

      # Publish a GitHub Release ONLY if it's a 'v' tag
      - name: Create GitHub Release and Upload VIP
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VIP_PATH }}
          # Use the commit message for the GitHub Release body as well
          body: ${{ github.event.head_commit.message }}
          generate_release_notes: false