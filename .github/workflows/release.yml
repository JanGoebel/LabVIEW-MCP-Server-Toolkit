name: Build and Release MCP Toolkit

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build VI Package via VIPM CLI
        run: |
          Get-Process "VI Package Manager" -ErrorAction SilentlyContinue | Stop-Process -Force
          
          $vipmPath = "C:\Program Files\JKI\VI Package Manager\support\VIPM File Handler.exe"
          $vipbFile = "$env:GITHUB_WORKSPACE\src\LabVIEW MCP Server SDK.vipb"
          
          Write-Host "Building VI Package... (This will take a few minutes)"
          
          $process = Start-Process -FilePath $vipmPath -ArgumentList "--", "/command:build", "/source:`"$vipbFile`"", "/QUIET:T" -Wait -PassThru
          
          if ($process.ExitCode -ne 0) {
            Write-Error "VIPM exited with error code $($process.ExitCode)"
            exit 1
          }
          Write-Host "Build completed successfully."

      - name: Locate Built VIP Artifact
        id: find_vip
        run: |
          $vipFile = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\builds" | Where-Object { $_.Extension -eq ".vip" } | Select-Object -First 1
          echo "VIP_PATH=$($vipFile.FullName)" >> $env:GITHUB_ENV

      - name: Upload Artifact for Testing
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: test-vip-package
          path: ${{ env.VIP_PATH }}

      - name: Create GitHub Release and Upload VIP
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VIP_PATH }}
          generate_release_notes: true