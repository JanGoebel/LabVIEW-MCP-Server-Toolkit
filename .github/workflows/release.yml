name: Build and Release MCP Toolkit

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build VI Package via VIPM CLI
        timeout-minutes: 20 
        run: |
          $vipbFile = "$env:GITHUB_WORKSPACE\src\LabVIEW MCP Server SDK.vipb"
          
          # 1. Grab the Git tag (e.g., 'v1.2.3' or '1.2.3')
          $gitTag = "${{ github.ref_name }}"
          Write-Host "Detected Git Tag: $gitTag"
          
          # 2. Extract the numbers using Regex (handles v1.2.3 and 1.2.3.4 formats)
          if ($gitTag -match "v?(\d+)\.(\d+)\.(\d+)(?:\.(\d+))?") {
            $major = $matches[1]
            $minor = $matches[2]
            $patch = $matches[3]
            $build = if ($matches[4]) { $matches[4] } else { 0 }
            
            Write-Host "Updating VIPB to version: $major.$minor.$patch.$build"
            
            # 3. Read the VIPB file, replace the XML tags, and save it back
            $vipbContent = Get-Content $vipbFile
            $vipbContent = $vipbContent -replace "<Version_Major>\d+</Version_Major>", "<Version_Major>$major</Version_Major>"
            $vipbContent = $vipbContent -replace "<Version_Minor>\d+</Version_Minor>", "<Version_Minor>$minor</Version_Minor>"
            $vipbContent = $vipbContent -replace "<Version_Patch>\d+</Version_Patch>", "<Version_Patch>$patch</Version_Patch>"
            $vipbContent = $vipbContent -replace "<Version_Build>\d+</Version_Build>", "<Version_Build>$build</Version_Build>"
            Set-Content -Path $vipbFile -Value $vipbContent
          } else {
            Write-Warning "Git tag '$gitTag' does not look like a version number (e.g. v1.2.3). Using default VIPB version."
          }

          # 4. Run the build (VIPM will now see the updated XML)
          Write-Host "Building VI Package..."
          vipm build "$vipbFile"
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "VIPM CLI build failed with exit code $LASTEXITCODE."
            exit 1
          }

      - name: Locate Built VIP Artifact
        id: find_vip
        run: |
          $vipFile = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\builds" | Where-Object { $_.Extension -eq ".vip" } | Select-Object -First 1
          echo "VIP_PATH=$($vipFile.FullName)" >> $env:GITHUB_ENV

      - name: Upload Artifact for Testing
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: test-vip-package
          path: ${{ env.VIP_PATH }}

      - name: Create GitHub Release and Upload VIP
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VIP_PATH }}
          generate_release_notes: true